# extraction_rules.yaml
# Professional Extraction Registry & Rubric Constraints

metadata:
  version: "1.2.0"
  description: "Enterprise extraction rules for Robust AI Document Extractor"
  last_updated: "2026-03-04"

chunking:
  method: semantic               # Options: semantic, fixed, experimental_layout_aware
  semantic:
    max_tokens: 512              # optimized for embedding models
    min_tokens: 128              # avoid noisy chunks
    overlap_tokens: 64           # context preservation
    breakpoint_threshold: 0.8    # cosine distance threshold for semantic splits
  fixed:
    page_window: 1               # pages per chunk
    overlap_pages: 0

strategy_tiers:
  # The router evaluates strategies in order: FastText -> Layout -> Vision
  # If a strategy yields a confidence below its 'confidence_threshold', the 
  # system escalates to the next tier in the cascade.
  fast_text_sufficient:          # Tier A
    provider: "pdfplumber"
    model_id: "native_extractor"
    applicable_layouts: ["single_column", "standard_report"]
    confidence_threshold: 0.92
    retry_strategy: "escalate_on_fail"
    estimated_cost: 0.00
  
  needs_layout_model:            # Tier B
    provider: "docling"
    model_id: "layout_v3_balanced"
    applicable_layouts: ["mixed_2col"]
    confidence_threshold: 0.88
    retry_strategy: "escalate_on_fail"
    estimated_cost: 0.05
  
  needs_vision_model:            # Tier C (VLM)
    provider: "openrouter"
    model_id: "google/gemini-2.0-flash-001"
    applicable_layouts: ["scanned_image", "complex_nested", "handwritten", "table_heavy", "figure_heavy"]
    confidence_threshold: 0.85
    retry_strategy: "human_in_the_loop"
    estimated_cost: 0.15

escalation:
  enable: true
  max_attempts: 2
  logging: true
  fallback_strategy: "needs_vision_model"

summarization:
  cheap_model: "google/gemini-2.0-flash-lite-001"
  max_length: 250
  temperature: 0.3

entities:
  ner_strategy: "llm_extraction"
  target_entities: ["ORGANIZATION", "PERSON", "DATE", "MONETARY_VALUE", "POLICY_NUM"]

storage:
  vector_store: "faiss_local"
  fact_table: "jsonl_ledger"
  audit_trail: true

defaults:
  language: en
  domain_hint: general
  strict_mode: true

triage:
  origin:
    # Thresholds for classifying the source format of the document.
    # High scanned ratio or empty text triggers Vision routing.
    scanned_image_ratio_threshold: 0.5
    # Documents pulling fewer than this characters are classified as zero-text
    zero_text_char_limit: 50
    form_interactive_ratio: 0.1
    image_area_coverage_threshold: 0.8  # if > 80% of page is images
  layout:
    table_heavy_threshold: 0.3
    figure_heavy_threshold: 0.3
  domains:
    # Keyword lists for domain classification. 
    # To onboard a new domain, simply add a new list key here with relevant trigger words.
    financial: ["revenue", "income", "balance sheet", "profit", "fiscal", "tax"]
    technical: ["algorithm", "performance", "implementation", "latency", "system", "architecture"]
    medical: ["patient", "diagnosis", "treatment", "clinical", "symptom", "therapy"]

vision_extractor:
  # Cost and stability limits for the external Vision (VLM) fallback
  max_pages_budget: 10
  max_tokens_per_page: 1500
  retry:
    max_retries: 3
    retry_delay_seconds: 5